<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Music Generation</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="container">
        <div class="card">
            <h1>AI Music Generation</h1>
            <p class="subtitle">
                Generate original MIDI music using an LSTM deep learning model.
            </p>

            <form action="/generate" method="POST">
                <label for="length">Number of Notes</label>
                <input 
                    type="number" 
                    id="length" 
                    name="length" 
                    value="300" 
                    min="100" 
                    max="800"
                >

                <label for="temperature">Creativity Level</label>
                <select id="temperature" name="temperature">
                    <option value="0.5">Low - More stable</option>
                    <option value="0.8" selected>Medium - Balanced</option>
                    <option value="1.0">High - More creative</option>
                </select>

                <button type="submit">Generate Music</button>
            </form>

            {% if success %}
                <div class="success-box">
                    <p>{{ message }}</p>
                    <a href="{{ url_for('download_file', filename=filename) }}">
                        Download Generated MIDI
                    </a>
                </div>
            {% endif %}

            {% if error %}
                <div class="error-box">
                    <p>{{ error }}</p>
                </div>
            {% endif %}
        </div>
    </div>

</body>
</html>
